<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Red Dead Redemption 3</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="assets/favicon-red-dead-redemption-3.png">
    <link rel="stylesheet" href="css/style.css?v=20260518a">
    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            line-height: 1;
            margin: 0;
            color: #8B2500;
        }
        .error-message {
            font-size: 1.5rem;
            margin: 1rem 0 2rem;
        }
        .error-link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #8B2500;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            transition: opacity 0.2s;
        }
        .error-link:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <h1 class="error-code">404</h1>
        <p class="error-message">This page doesn't exist.</p>
        <a href="/" class="error-link">Back to home</a>
    </div>
</body>
</html>
