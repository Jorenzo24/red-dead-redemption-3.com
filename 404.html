<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: Page Not Found | Red Dead Redemption 3</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="assets/favicon-red-dead-redemption-3.png">
    <link rel="preload" href="assets/fonts/chinese-rock.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="css/style.css?v=20260624b">
    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-family: var(--serif);
            font-size: clamp(7rem, 22vw, 14rem);
            line-height: 1;
            margin: 0;
            color: var(--accent);
            text-shadow: 0 2px 30px rgba(200, 32, 30, 0.25);
        }
        .error-message {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin: 1rem 0 2.5rem;
        }
        .error-link {
            display: inline-block;
            padding: 0.75rem 1.75rem;
            background: var(--accent);
            color: #fff;
            border-radius: 2px;
            font-family: var(--serif);
            letter-spacing: 0.15em;
            font-size: 0.95rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <h1 class="error-code">404</h1>
        <p class="error-message">This trail doesn't lead anywhere.</p>
        <a href="/" class="error-link">Back to home</a>
    </div>
</body>
</html>
